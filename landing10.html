<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BrainBloom — 첫 한 줄</title>
<meta name="description" content="설치도 가입도 없이 브라우저에서 바로 쓰는 개인용 마인드맵. 내용은 내 브라우저에만 저장됩니다." />
<meta name="theme-color" content="#fbfcfe" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* 10 첫 한 줄 — 입력창이 곧 시작 */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Plus Jakarta Sans', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #fbfcfe; -webkit-font-smoothing: antialiased; color: #28303d; }
  .stage { position: relative; width: 100%; height: 100vh; min-height: 760px; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at 50% 20%, #f0f3f8 0%, transparent 55%), #fbfcfe; }
  .stage::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(0,0,0,0.05) 1px, transparent 1px); background-size: 24px 24px; pointer-events: none; }
  .brand-row { display: flex; align-items: center; gap: 10px; margin-bottom: 34px; z-index: 3; }
  .brand-logo { width: 30px; height: 30px; border-radius: 8px; box-shadow: 0 2px 6px rgba(40,30,60,0.18); }
  .brand-mark { font-family: 'Fraunces', serif; font-weight: 900; font-size: 24px; letter-spacing: -0.02em; }
  .brand-mark em { font-style: italic; font-weight: 400; color: #d96b54; }
  h1 { font-family: 'Fraunces', 'Nanum Myeongjo', serif; font-weight: 800; font-size: clamp(38px, 4.4vw, 54px); line-height: 1.26; letter-spacing: -0.01em; text-align: center; word-break: keep-all; z-index: 3; }
  h1 em { font-style: italic; font-weight: 600; color: #d96b54; }
  .sub { margin-top: 18px; font-size: 16.5px; line-height: 1.8; color: #61708a; text-align: center; word-break: keep-all; text-wrap: pretty; z-index: 3; }
  .sprout { position: relative; width: min(620px, 88vw); height: 110px; margin-top: 8px; z-index: 2; }
  .mini { position: absolute; transform: translate(-50%, -50%); color: #fff; padding: 6px 11px; border-radius: 11px; font-family: 'Fraunces', 'Nanum Myeongjo', serif; font-weight: 700; font-size: 12.5px; white-space: nowrap; box-shadow: 0 4px 14px rgba(40,48,61,0.18); animation: rise 6s ease-in-out infinite; }
  @keyframes rise { 0%, 100% { transform: translate(-50%, -50%); } 50% { transform: translate(-50%, calc(-50% - 7px)); } }
  .input-cta { position: relative; display: flex; align-items: center; gap: 14px; width: min(620px, 88vw); padding: 10px 10px 10px 26px; background: #fff; border: 1px solid #dde3ec; border-radius: 999px; box-shadow: 0 18px 50px rgba(40,48,61,0.14), 0 2px 10px rgba(40,48,61,0.06); text-decoration: none; color: #28303d; transition: transform 0.2s, box-shadow 0.2s; z-index: 3; }
  .input-cta:hover { transform: translateY(-2px); box-shadow: 0 24px 60px rgba(40,48,61,0.18), 0 2px 10px rgba(40,48,61,0.06); }
  .seed-dot { width: 10px; height: 10px; border-radius: 50%; background: #3a6ea5; flex: 0 0 auto; }
  .typed { font-family: 'JetBrains Mono', monospace; font-size: 16px; color: #28303d; }
  .caret { display: inline-block; width: 9px; height: 19px; background: #d96b54; vertical-align: -3px; margin-left: 3px; animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 0%, 55% { opacity: 1; } 56%, 100% { opacity: 0; } }
  .go { margin-left: auto; display: inline-flex; align-items: center; gap: 8px; background: #d96b54; color: #fff; font-size: 15.5px; font-weight: 700; padding: 13px 26px; border-radius: 999px; flex: 0 0 auto; }
  .ghost { margin-top: 18px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.06em; color: #8a95a8; z-index: 3; }
  .ghost kbd { background: #eaeef3; padding: 2px 7px; border-radius: 4px; font-size: 10px; color: #28303d; border: 1px solid #dde3ec; font-family: 'JetBrains Mono', monospace; }
  .micro { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: #8a95a8; letter-spacing: 0.1em; margin-top: 34px; z-index: 3; }
  .views { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; justify-content: center; z-index: 3; }
  .view-pill { display: inline-flex; align-items: center; padding: 7px 14px; border-radius: 999px; border: 1px solid #dde3ec; background: #f4f6f9; color: #445068; font-size: 12.5px; font-weight: 600; }
  .privacy-wrap { position: absolute; left: 0; right: 0; bottom: 26px; display: flex; justify-content: center; z-index: 4; padding: 0 16px; }
  .privacy { display: inline-flex; align-items: center; gap: 9px; padding: 9px 20px; border-radius: 999px; border: 1px solid #dde3ec; background: rgba(251,252,254,0.9); }
  .privacy .txt { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.04em; color: #61708a; }
  .switch { position: fixed; bottom: 16px; right: 16px; z-index: 9; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: #cdd9ee; background: rgba(16,24,40,0.78); border: 1px solid rgba(255,255,255,0.18); padding: 6px 12px; border-radius: 999px; text-decoration: none; }
  .switch:hover { background: rgba(30,45,76,0.95); }
</style>
</head>
<body>
<div class="stage">
  <div class="brand-row">
    <svg class="brand-logo" viewBox="0 0 96 96" role="img" aria-label="BrainBloom">
      <defs><linearGradient id="bbFunnel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3a86ff"/><stop offset="1" stop-color="#00b4d8"/></linearGradient></defs>
      <rect width="96" height="96" rx="22" fill="url(#bbFunnel)"/>
      <circle cx="32" cy="22" r="3.5" fill="#ffd60a"/><circle cx="44" cy="17" r="3.5" fill="#ff5d8f"/><circle cx="56" cy="20" r="3.5" fill="#06d6a0"/><circle cx="64" cy="25" r="3" fill="#80ed99"/><circle cx="38" cy="27" r="3" fill="#ffb703"/>
      <path d="M24 32h48l-15 22v8H39v-8z" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M48 68l2.5 7 7 .5-5.5 4.5 2 7-6-4-6 4 2-7-5.5-4.5 7-.5z" fill="#fff"/>
    </svg>
    <span class="brand-mark">Brain<em>Bloom</em></span>
  </div>

  <h1>시작은 한 줄이면<br><em>충분합니다.</em></h1>
  <p class="sub">적는 순간 지도가 자라기 시작합니다.</p>

  <div class="sprout" aria-hidden="true">
    <svg style="position:absolute; inset:0; width:100%; height:100%;" viewBox="0 0 620 110" preserveAspectRatio="xMidYMax meet">
      <path d="M 310 108 C 310 78, 185 76, 185 46" stroke="#d9743f" stroke-width="1.8" fill="none" opacity="0.5"/>
      <path d="M 310 108 C 310 70, 310 62, 310 30" stroke="#2a8c7d" stroke-width="1.8" fill="none" opacity="0.5"/>
      <path d="M 310 108 C 310 78, 437 74, 437 44" stroke="#cc5e80" stroke-width="1.8" fill="none" opacity="0.5"/>
    </svg>
    <span class="mini" style="left:185px; top:32px; background:#d9743f;">제주</span>
    <span class="mini" style="left:310px; top:16px; background:#2a8c7d; animation-delay:0.8s;">맛집</span>
    <span class="mini" style="left:437px; top:30px; background:#cc5e80; animation-delay:1.6s;">일정</span>
  </div>

  <a class="input-cta" href="index.html?app" onclick="try{localStorage.setItem('bb_visited','1')}catch(e){}">
    <span class="seed-dot"></span>
    <span class="typed">제주 여행 계획<span class="caret"></span></span>
    <span class="go">바로 사용하기 →</span>
  </a>
  <div class="ghost"><kbd>Tab</kbd> 자식 가지 · <kbd>Enter</kbd> 형제 가지 — 적는 대로 지도가 됩니다</div>

  <div class="micro">무료 · 설치 없음 · 가입 없음</div>
  <div class="views">
    <span class="view-pill">마인드맵</span><span class="view-pill">아웃라인</span><span class="view-pill">간트</span><span class="view-pill">타임라인</span>
  </div>

  <div class="privacy-wrap">
    <div class="privacy"><span style="font-size:12px;">🔒</span><span class="txt">NO SERVER — 내용은 내 브라우저에만 저장됩니다</span></div>
  </div>
</div>
<a class="switch" href="landing.html" title="다른 디자인 보기">10/10 ↻</a>
<script>
/* 랜덤 랜딩 공통: 이번 디자인 번호를 기록해 "다른 디자인 ↻"가 같은 걸 다시 고르지 않게 하고,
   폰(터치+짧은 변 600px 미만)이면 CTA가 무거운 앱 본체 대신 모바일 버전으로 가게 한다 */
try {
  sessionStorage.setItem('bb_landing_last', '10');
  history.replaceState(null, '', 'landing.html'); // 주소창에 파일명(landingNN.html) 대신 landing.html만 보이게
  if (window.matchMedia('(pointer: coarse)').matches && Math.min(screen.width, screen.height) < 600)
    document.querySelectorAll('a[href^="index.html?app"]').forEach(function(a) { a.href = 'mobile.html?app'; });
} catch (e) {}
</script>
</body>
</html>
