<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BrainBloom — 간트 리듬</title>
<meta name="description" content="설치도 가입도 없이 브라우저에서 바로 쓰는 개인용 마인드맵. 내용은 내 브라우저에만 저장됩니다." />
<meta name="theme-color" content="#f4f6f9" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* 07 간트 리듬 — 계획은 리듬이 됩니다 */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Plus Jakarta Sans', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f4f6f9; -webkit-font-smoothing: antialiased; color: #28303d; }
  .stage { position: relative; width: 100%; height: 100vh; min-height: 760px; overflow: hidden; background: #f4f6f9; }
  .bar { position: absolute; height: 58px; border-radius: 999px; }
  .bar-label { position: absolute; font-family: 'Fraunces', 'Nanum Myeongjo', serif; font-weight: 700; font-size: 14px; color: #fff; padding: 10px 16px; white-space: nowrap; }
  .today { position: absolute; top: 0; bottom: 0; left: 58%; width: 0; border-left: 2px dashed rgba(217,107,84,0.5); z-index: 2; }
  .today-chip { position: absolute; top: 24px; left: -22px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.12em; background: #d96b54; color: #fff; padding: 4px 9px; border-radius: 999px; }
  .center { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 3; width: min(720px, 92vw); }
  .brand-row { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 26px; }
  .brand-logo { width: 30px; height: 30px; border-radius: 8px; box-shadow: 0 2px 6px rgba(40,30,60,0.18); }
  .brand-mark { font-family: 'Fraunces', serif; font-weight: 900; font-size: 24px; letter-spacing: -0.02em; }
  .brand-mark em { font-style: italic; font-weight: 400; color: #d96b54; }
  h1 { font-family: 'Fraunces', 'Nanum Myeongjo', serif; font-weight: 800; font-size: clamp(42px, 5vw, 64px); line-height: 1.22; letter-spacing: -0.015em; word-break: keep-all; }
  h1 em { font-style: italic; font-weight: 600; color: #d96b54; }
  .sub { margin-top: 22px; font-size: 17px; line-height: 1.8; color: #61708a; word-break: keep-all; text-wrap: pretty; }
  .cta { display: inline-flex; align-items: center; gap: 10px; margin-top: 36px; background: #28303d; color: #f4f6f9; font-size: 17px; font-weight: 700; padding: 17px 36px; border-radius: 999px; text-decoration: none; box-shadow: 0 10px 28px rgba(40,48,61,0.28); transition: background 0.2s; }
  .cta:hover { background: #d96b54; }
  .micro { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: #8a95a8; letter-spacing: 0.1em; margin-top: 15px; }
  .views { display: flex; gap: 10px; margin-top: 32px; flex-wrap: wrap; justify-content: center; }
  .view-pill { display: inline-flex; align-items: center; gap: 7px; padding: 8px 15px; border-radius: 999px; border: 1px solid #dde3ec; background: rgba(251,252,254,0.85); color: #445068; font-size: 13px; font-weight: 600; }
  .privacy-wrap { position: absolute; left: 0; right: 0; bottom: 26px; display: flex; justify-content: center; z-index: 4; padding: 0 16px; }
  .privacy { display: inline-flex; align-items: center; gap: 9px; padding: 9px 20px; border-radius: 999px; border: 1px solid #dde3ec; background: rgba(251,252,254,0.9); }
  .privacy .txt { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.04em; color: #61708a; }
  .switch { position: fixed; bottom: 16px; right: 16px; z-index: 9; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: #cdd9ee; background: rgba(16,24,40,0.78); border: 1px solid rgba(255,255,255,0.18); padding: 6px 12px; border-radius: 999px; text-decoration: none; }
  .switch:hover { background: rgba(30,45,76,0.95); }
</style>
</head>
<body>
<div class="stage">
  <!-- 배경 간트 바 리듬 -->
  <div class="bar" style="left:-4%;  top:9%;  width:34%; background:rgba(217,116,63,0.16);"></div>
  <div class="bar" style="left:14%;  top:21%; width:52%; background:rgba(42,140,125,0.15);"></div>
  <div class="bar" style="left:-8%;  top:33%; width:28%; background:rgba(74,123,196,0.15);"></div>
  <div class="bar" style="left:70%;  top:15%; width:44%; background:rgba(204,94,128,0.13);"></div>
  <div class="bar" style="left:60%;  top:69%; width:52%; background:rgba(192,138,45,0.16);"></div>
  <div class="bar" style="left:-6%;  top:77%; width:38%; background:rgba(130,104,172,0.15);"></div>
  <div class="bar" style="left:24%;  top:88%; width:60%; background:rgba(58,110,165,0.14);"></div>
  <div class="bar" style="left:76%;  top:44%; width:30%; background:#2a8c7d; height:44px; box-shadow:0 10px 30px rgba(42,140,125,0.35);"><span class="bar-label" style="padding:11px 18px;">우도 자전거 🚲</span></div>
  <div class="bar" style="left:2%;   top:57%; width:24%; background:#d9743f; height:44px; box-shadow:0 10px 30px rgba(217,116,63,0.35);"><span class="bar-label" style="padding:11px 18px;">5/12 제주 출발</span></div>
  <div class="today"><span class="today-chip">오늘</span></div>

  <main class="center">
    <div class="brand-row">
      <svg class="brand-logo" viewBox="0 0 96 96" role="img" aria-label="BrainBloom">
        <defs><linearGradient id="bbFunnel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3a86ff"/><stop offset="1" stop-color="#00b4d8"/></linearGradient></defs>
        <rect width="96" height="96" rx="22" fill="url(#bbFunnel)"/>
        <circle cx="32" cy="22" r="3.5" fill="#ffd60a"/><circle cx="44" cy="17" r="3.5" fill="#ff5d8f"/><circle cx="56" cy="20" r="3.5" fill="#06d6a0"/><circle cx="64" cy="25" r="3" fill="#80ed99"/><circle cx="38" cy="27" r="3" fill="#ffb703"/>
        <path d="M24 32h48l-15 22v8H39v-8z" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M48 68l2.5 7 7 .5-5.5 4.5 2 7-6-4-6 4 2-7-5.5-4.5 7-.5z" fill="#fff"/>
      </svg>
      <span class="brand-mark">Brain<em>Bloom</em></span>
    </div>
    <h1>흩어진 생각이<br><em>계획의 리듬이 됩니다.</em></h1>
    <p class="sub">마인드맵의 가지에 날짜를 달면, 그대로 간트 차트가 됩니다.<br>생각 정리에서 일정 관리까지 — 한 곳에서.</p>
    <a class="cta" href="index.html?app" onclick="try{localStorage.setItem('bb_visited','1')}catch(e){}">바로 사용하기 <span>→</span></a>
    <div class="micro">무료 · 설치 없음 · 가입 없음</div>
    <div class="views">
      <span class="view-pill">마인드맵</span><span class="view-pill">아웃라인</span><span class="view-pill">간트</span><span class="view-pill">타임라인</span>
    </div>
  </main>

  <div class="privacy-wrap">
    <div class="privacy"><span style="font-size:12px;">🔒</span><span class="txt">NO SERVER — 내용은 내 브라우저에만 저장됩니다</span></div>
  </div>
</div>
<a class="switch" href="landing.html" title="다른 디자인 보기">07/10 ↻</a>
<script>
/* 랜덤 랜딩 공통: 이번 디자인 번호를 기록해 "다른 디자인 ↻"가 같은 걸 다시 고르지 않게 하고,
   폰(터치+짧은 변 600px 미만)이면 CTA가 무거운 앱 본체 대신 모바일 버전으로 가게 한다 */
try {
  sessionStorage.setItem('bb_landing_last', '07');
  history.replaceState(null, '', 'landing.html'); // 주소창에 파일명(landingNN.html) 대신 landing.html만 보이게
  if (window.matchMedia('(pointer: coarse)').matches && Math.min(screen.width, screen.height) < 600)
    document.querySelectorAll('a[href^="index.html?app"]').forEach(function(a) { a.href = 'mobile.html?app'; });
} catch (e) {}
</script>
</body>
</html>
