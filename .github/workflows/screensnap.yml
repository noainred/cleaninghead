name: ScreenSnap Build

on:
  push:
    branches: [main]
    tags: ['screensnap-v*']
    paths:
      - 'ScreenSnap/**'
      - '.github/workflows/screensnap.yml'
  pull_request:
    paths:
      - 'ScreenSnap/**'
      - '.github/workflows/screensnap.yml'
  workflow_dispatch:   # 수동 실행 → 아티팩트 받기

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-14
    defaults:
      run:
        working-directory: ScreenSnap
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build standalone .app (+ zip)
        run: ./build.sh

      - name: Upload ScreenSnap.app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenSnap-app
          path: ScreenSnap/ScreenSnap.app.zip
          if-no-files-found: error

      - name: Publish release (on version tag)
        if: startsWith(github.ref, 'refs/tags/screensnap-v')
        uses: softprops/action-gh-release@v2
        with:
          files: ScreenSnap/ScreenSnap.app.zip
          generate_release_notes: true
