<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>BrainBloom Mobile — 마인드맵</title>
<meta name="description" content="BrainBloom 모바일 — 터치에 맞춘 마인드맵·브레인스토밍. 데스크톱과 같은 데이터(브라우저·구글 드라이브)를 씁니다." />
<meta name="theme-color" content="#f4f1ea" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#181c26" media="(prefers-color-scheme: dark)" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<script>
/* ?app: 랜딩 건너뛰기 방문 기록(데스크톱과 동일 규칙) · ?desktop: 데스크톱 강제 → index.html로 */
(function(){ try {
  var q = new URLSearchParams(location.search);
  if (q.has('app')) localStorage.setItem('bb_visited','1');
  if (q.has('desktop')) { localStorage.setItem('bb_force_desktop','1'); location.replace('index.html?desktop'); }
} catch(e){} })();
</script>
<style>
/* ============================================================
   BrainBloom Mobile — 터치 퍼스트 경량 앱 (바닐라 JS, 프레임워크 없음)
   데스크톱(index.html)과 같은 IndexedDB(brainbloom/kv)·드라이브 규칙 공유
   ============================================================ */
:root{
  --bg:#f4f1ea; --panel:#ffffff; --ink:#20242e; --ink-soft:#6b7280; --line:#e2ddd2;
  --accent:#d96b54; --accent-soft:#f7e5e0; --navy:#3a6ea5; --ok:#2a8c7d;
  --sheet:#ffffff; --tap:rgba(0,0,0,0.06);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#181c26; --panel:#212736; --ink:#e8ebf2; --ink-soft:#9aa3b5; --line:#323a4d;
    --accent:#e07a62; --accent-soft:#3a2b28; --sheet:#232a3a; --tap:rgba(255,255,255,0.08);
  }
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Noto Sans KR','Malgun Gothic',sans-serif;
  background:var(--bg); color:var(--ink); overflow:hidden;
  -webkit-font-smoothing:antialiased; touch-action:manipulation;
}
button{font-family:inherit; border:none; background:none; color:inherit; cursor:pointer;}
input,textarea{font-family:inherit;}

/* ── 레이아웃 셸 ── */
#app{display:flex; flex-direction:column; height:100dvh;}
header{
  flex:0 0 auto; display:flex; align-items:center; gap:8px;
  padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;
  background:var(--panel); border-bottom:1px solid var(--line);
}
#docName{
  flex:1 1 auto; min-width:0; font-size:16px; font-weight:800;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  padding:6px 8px; border-radius:8px;
}
#docName:active{background:var(--tap);}
#saveDot{flex:0 0 auto; font-size:11px; color:var(--ink-soft);}
.hbtn{flex:0 0 auto; font-size:18px; padding:8px 10px; border-radius:10px;}
.hbtn:active{background:var(--tap);}
main{flex:1 1 auto; min-height:0; position:relative;}
.view{position:absolute; inset:0; display:none; overflow:hidden;}
.view.on{display:block;}

/* ── 하단 탭바 ── */
nav{
  flex:0 0 auto; display:flex; background:var(--panel); border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
nav button{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:9px 0 7px; font-size:11px; color:var(--ink-soft); font-weight:600;
}
nav button .ic{font-size:20px; line-height:1;}
nav button.on{color:var(--accent);}

/* ── 아웃라인(편집) ── */
#outlineView{overflow-y:auto; -webkit-overflow-scrolling:touch; padding:10px 8px 90px;}
.ol-row{display:flex; align-items:flex-start; gap:4px; border-radius:12px; padding:2px 4px;
  -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;} /* 길게 누르기 메뉴용 — 브라우저 텍스트 선택/콜아웃 방지 */
.ol-row.sel{background:var(--accent-soft);}
.ol-fold{flex:0 0 34px; height:44px; display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--ink-soft);}
.ol-dot{flex:0 0 12px; height:44px; display:flex; align-items:center;}
.ol-dot i{width:11px; height:11px; border-radius:50%; display:block;}
.ol-label{
  flex:1 1 auto; min-width:0; min-height:44px; display:flex; align-items:center;
  font-size:15.5px; line-height:1.45; word-break:break-word; padding:9px 4px;
}
.ol-label.root{font-weight:800; font-size:17px;}
.ol-label.done{text-decoration:line-through; opacity:0.55;}
.ol-edit{
  flex:1 1 auto; min-width:0; font-size:15.5px; line-height:1.45; padding:9px 8px;
  border:1.5px solid var(--accent); border-radius:10px; background:var(--panel); color:var(--ink);
  resize:none; overflow:hidden;
}
.ol-more{flex:0 0 40px; height:44px; display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--ink-soft); border-radius:10px;}
.ol-more:active{background:var(--tap);}
.ol-empty{text-align:center; color:var(--ink-soft); padding:60px 20px; font-size:14px; line-height:1.8;}

/* FAB */
#fab{
  position:absolute; right:18px; bottom:18px; z-index:5;
  width:56px; height:56px; border-radius:50%; background:var(--accent); color:#fff;
  font-size:26px; font-weight:700; box-shadow:0 6px 20px rgba(0,0,0,0.25);
  display:flex; align-items:center; justify-content:center;
}
#fab:active{transform:scale(0.94);}

/* ── 맵(보기) ── */
#mapView{background:radial-gradient(circle, var(--tap) 1px, transparent 1px); background-size:24px 24px; touch-action:none;}
#mapSvg{width:100%; height:100%; display:block;}
#mapHint{
  position:absolute; left:50%; bottom:14px; transform:translateX(-50%);
  font-size:11px; color:var(--ink-soft); background:var(--panel); border:1px solid var(--line);
  padding:6px 14px; border-radius:100px; white-space:nowrap;
}
.map-node rect{stroke:rgba(255,255,255,0.14);}
.map-node text{fill:#fff; font-weight:700; pointer-events:none;}
.map-node.sel rect{stroke:#fff; stroke-width:2.5;}

/* ── 시트(반모달) ── */
.sheet-back{position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:20; display:none;}
.sheet-back.on{display:block;}
.sheet{
  position:fixed; left:0; right:0; bottom:0; z-index:21; display:none;
  background:var(--sheet); border-radius:18px 18px 0 0; max-height:82dvh;
  padding:8px 16px calc(env(safe-area-inset-bottom) + 16px);
  overflow-y:auto; -webkit-overflow-scrolling:touch;
  box-shadow:0 -8px 40px rgba(0,0,0,0.25);
}
.sheet.on{display:block; animation:sheetUp 0.18s ease;}
@keyframes sheetUp{from{transform:translateY(30px); opacity:0.6;} to{transform:translateY(0); opacity:1;}}
.sheet .grip{width:40px; height:4px; border-radius:2px; background:var(--line); margin:4px auto 12px;}
.sheet h3{font-size:15px; font-weight:800; margin:6px 2px 10px;}
.sh-item{
  display:flex; align-items:center; gap:12px; width:100%;
  padding:13px 10px; border-radius:12px; font-size:15px; font-weight:600; text-align:left;
}
.sh-item:active{background:var(--tap);}
.sh-item .ic{flex:0 0 26px; text-align:center; font-size:17px;}
.sh-item.danger{color:#c0392b;}
.sh-sep{height:1px; background:var(--line); margin:8px 0;}
.sh-note{font-size:12px; color:var(--ink-soft); padding:4px 10px 8px; line-height:1.6;}

/* 색상 그리드 */
.color-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:10px; padding:6px 4px 10px;}
.color-grid button{width:38px; height:38px; border-radius:50%; margin:0 auto; border:2.5px solid transparent;}
.color-grid button.on{border-color:var(--ink);}

/* 문서 목록 */
.doc-row{display:flex; align-items:center; gap:10px; width:100%; padding:12px 10px; border-radius:12px; text-align:left;}
.doc-row:active{background:var(--tap);}
.doc-row.cur{background:var(--accent-soft);}
.doc-row .nm{flex:1 1 auto; min-width:0; font-size:15px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.doc-row .sub{font-size:11px; color:var(--ink-soft); font-weight:400; display:block; margin-top:2px;}
.doc-row .mini{flex:0 0 auto; font-size:15px; padding:8px; border-radius:8px; color:var(--ink-soft);}
.doc-row .mini:active{background:var(--tap);}
.badge{flex:0 0 auto; font-size:10px; font-weight:700; color:#fff; background:var(--ink-soft); border-radius:6px; padding:2px 6px;}
.badge.accent{background:var(--accent);}
.sh-actions{display:flex; gap:8px; padding:4px 2px 2px;}
.sh-actions .btn{
  flex:1; padding:12px; border-radius:12px; font-size:14px; font-weight:700; text-align:center;
  border:1px solid var(--line); background:var(--panel);
}
.sh-actions .btn.primary{background:var(--accent); border-color:var(--accent); color:#fff;}

/* 토스트 */
#toast{
  position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 84px); transform:translateX(-50%);
  background:var(--ink); color:var(--bg); font-size:13px; font-weight:600;
  padding:10px 18px; border-radius:100px; z-index:40; opacity:0; pointer-events:none;
  transition:opacity 0.2s; max-width:86vw; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
#toast.on{opacity:0.95;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div id="docName">문서</div>
    <span id="saveDot"></span>
    <button class="hbtn" id="btnDrive" title="구글 드라이브">☁</button>
    <button class="hbtn" id="btnMenu" title="메뉴">⋯</button>
  </header>

  <main>
    <div class="view on" id="outlineView"></div>
    <div class="view" id="mapView">
      <svg id="mapSvg"></svg>
      <div id="mapHint">한 손가락 이동 · 두 손가락 확대 · 노드 꾹 누르면 메뉴</div>
    </div>
  </main>

  <button id="fab" title="가지 추가">＋</button>

  <nav>
    <button data-tab="outline" class="on"><span class="ic">📝</span>편집</button>
    <button data-tab="map"><span class="ic">🗺</span>맵</button>
    <button data-tab="docs"><span class="ic">📄</span>문서</button>
  </nav>
</div>

<div class="sheet-back" id="sheetBack"></div>
<div class="sheet" id="sheet"></div>
<div id="toast"></div>

<script>
'use strict';
/* ═══════════ 공유 상수 — 데스크톱(index.html)과 반드시 동일 ═══════════ */
const DB_NAME = 'brainbloom', DB_VERSION = 1, STORE = 'kv';
const DOC_KEY = (id) => 'doc:' + id;
const DEFAULT_DOC_NAME = '제목 없는 문서';
const GOOGLE_CLIENT_ID = '775516377969-o87en42sib8h2ubvo0t68kdb05j3s7l3.apps.googleusercontent.com';
const GOOGLE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const DRIVE_FOLDER_NAME = 'BrainBloom';
const DRIVE_BACKUP_NAME = 'Backup';
const SETTINGS_FILE_NAME = 'BrainBloom_settings.json';
const DRIVE_TOKEN_KEY = 'bb_drive_tok';
const RESORT_PREFIXES = ['발리','몰디브','칸쿤','하와이','산토리니','푸켓','니스','세부','보라카이','두바이','마우이','타히티','카프리','아말피','푸꾸옥','제주','오키나와','칸느','마이애미','모나코'];
const COLORS = {
  navy:'#3a6ea5', orange:'#d9743f', amber:'#c08a2d', teal:'#2a8c7d', blue:'#4a7bc4',
  rose:'#cc5e80', moss:'#6f8f3e', slate:'#647396', plum:'#8268ac', rust:'#c0613f',
  forest:'#3d8a72', charcoal:'#4e5a6e', gold:'#b3893a', coral:'#d96b54',
};
const PALETTE_ORDER = ['orange','amber','teal','blue','rose','moss','plum'];

/* ═══════════ IndexedDB (데스크톱과 동일 kv 스토어) ═══════════ */
function openDB(){ return new Promise((res,rej)=>{ const r=indexedDB.open(DB_NAME,DB_VERSION);
  r.onupgradeneeded=()=>{ const db=r.result; if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE); };
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function idbGet(key){ try{ const db=await openDB(); return await new Promise((res)=>{ const tx=db.transaction(STORE,'readonly'); const rq=tx.objectStore(STORE).get(key); rq.onsuccess=()=>res(rq.result); rq.onerror=()=>res(undefined); }); }catch(e){ return undefined; } }
async function idbSet(key,val){ try{ const db=await openDB(); return await new Promise((res)=>{ const tx=db.transaction(STORE,'readwrite'); tx.objectStore(STORE).put(val,key); tx.oncomplete=()=>res(true); tx.onerror=()=>res(false); }); }catch(e){ return false; } }
async function idbDel(key){ try{ const db=await openDB(); return await new Promise((res)=>{ const tx=db.transaction(STORE,'readwrite'); tx.objectStore(STORE).delete(key); tx.oncomplete=()=>res(true); tx.onerror=()=>res(false); }); }catch(e){ return false; } }

/* ═══════════ 트리 유틸 (데스크톱 규칙과 호환) ═══════════ */
let idTick = 0;
const genId = () => 'm' + Date.now().toString(36) + (++idTick).toString(36) + Math.random().toString(36).slice(2,4);
function walk(n, fn){ fn(n); if(n.children) n.children.forEach(c=>walk(c,fn)); }
function findNode(n, id){ if(n.id===id) return n; if(n.children) for(const c of n.children){ const f=findNode(c,id); if(f) return f; } return null; }
function findParent(root, id){ let res=null; (function go(n){ if(res) return; for(const c of (n.children||[])){ if(c.id===id){ res=n; return; } go(c); } })(root); return res; }
function sanitizeTree(t){
  if(!t||typeof t!=='object') return null;
  function fix(n){
    if(!n||typeof n!=='object') return null;
    const out={...n};
    out.id = (typeof out.id==='string'&&out.id) ? out.id : genId();
    out.label = (typeof out.label==='string') ? out.label : '';
    out.children = Array.isArray(out.children) ? out.children.map(fix).filter(Boolean) : [];
    out.meta = (out.meta&&typeof out.meta==='object') ? out.meta : {};
    return out;
  }
  return fix(t);
}
function serializeTree(t){ // _로 시작하는 임시(레이아웃) 필드 제거 — 데스크톱 저장 규칙과 동일
  function strip(n){ const o={}; for(const k in n){ if(k==='children') continue; if(k[0]==='_') continue; o[k]=n[k]; } o.children=(n.children||[]).map(strip); return o; }
  return strip(t);
}
function treeToText(root){ // 데스크톱과 동일: 빈 라벨은 (이름 없음) 자리표시자
  if(!root) return ''; const lines=[];
  (function visit(n,d){ const lbl=(n.label||'').trim()?n.label:'(이름 없음)'; lines.push('  '.repeat(d)+lbl); (n.children||[]).forEach(c=>visit(c,d+1)); })(root,0);
  return lines.join('\n');
}
function docStatsOf(t){ if(!t) return {nodeCount:0,branches:[]}; let n=0; walk(t,()=>n++);
  const branches=(t.children||[]).slice(0,4).map(c=>((c&&typeof c.label==='string')?c.label.split('\n')[0].trim():'').slice(0,24)).filter(Boolean);
  return {nodeCount:n,branches}; }
function deriveDocName(t){ const s=t&&typeof t.label==='string'?t.label.split('\n')[0].trim():''; return (s||DEFAULT_DOC_NAME).slice(0,60); }
function assignDefaultColors(node,depth=0){ if(depth===0&&!node.color) node.color='navy';
  (node.children||[]).forEach((c,i)=>{ if(!c.color) c.color = depth===0 ? PALETTE_ORDER[i%PALETTE_ORDER.length] : node.color; assignDefaultColors(c,depth+1); }); }
const newDocId = () => 'd' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
function normalizeDocItem(d){ const savedAt=typeof d.savedAt==='number'?d.savedAt:Date.now();
  return { id:d.id, name:d.name||DEFAULT_DOC_NAME, savedAt, createdAt:typeof d.createdAt==='number'?d.createdAt:savedAt,
    auto:d.auto!==false, pinned:d.pinned===true, folderId:(typeof d.folderId==='string')?d.folderId:null,
    nodeCount:typeof d.nodeCount==='number'?d.nodeCount:0, branches:Array.isArray(d.branches)?d.branches.filter(s=>typeof s==='string'):[],
    tags:Array.isArray(d.tags)?d.tags.filter(s=>typeof s==='string'):[], memo:typeof d.memo==='string'?d.memo:'' }; }

/* ═══════════ 앱 상태 ═══════════ */
const S = { tree:null, docId:null, docList:[], folders:[], selectedId:null, editingId:null, tab:'outline', saveTimer:null, saving:false };
const $ = (sel)=>document.querySelector(sel);
const esc = (s)=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let toastTimer=null;
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('on'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('on'),1800); }

/* ═══════════ 저장 (데스크톱 writeActiveDoc 규칙) ═══════════ */
function persistDocMeta(){ idbSet('docMeta',{ currentId:S.docId, list:S.docList, folders:S.folders }); }
function scheduleSave(){ $('#saveDot').textContent='●'; clearTimeout(S.saveTimer); S.saveTimer=setTimeout(saveNow,800); }
async function saveNow(){
  if(!S.tree||!S.docId) return;
  const payload={ savedAt:Date.now(), tree:serializeTree(S.tree), inputText:treeToText(S.tree) };
  const cur=S.docList.find(d=>d.id===S.docId);
  const name=(cur&&cur.auto===false)?cur.name:deriveDocName(S.tree);
  const stats=docStatsOf(S.tree);
  await idbSet(DOC_KEY(S.docId),{...payload,name});
  await idbSet('lastWork',payload); // 데스크톱 시작 복원·드라이브 동기화 호환 미러
  S.docList=S.docList.map(d=>d.id===S.docId?{...d,savedAt:payload.savedAt,name,nodeCount:stats.nodeCount,branches:stats.branches}:d);
  persistDocMeta();
  $('#saveDot').textContent='';
  renderHeader();
}

/* ═══════════ 시작 로드 ═══════════ */
async function boot(){
  const meta=await idbGet('docMeta');
  if(meta&&Array.isArray(meta.list)&&meta.list.length){
    S.docList=meta.list.filter(d=>d&&d.id).map(normalizeDocItem);
    S.folders=Array.isArray(meta.folders)?meta.folders:[];
    S.docId=(meta.currentId&&S.docList.some(d=>d.id===meta.currentId))?meta.currentId:S.docList[0].id;
    const slot=await idbGet(DOC_KEY(S.docId));
    S.tree=sanitizeTree(slot&&slot.tree)||freshTree();
  } else {
    // 데스크톱 최초 승격 규칙과 동일: lastWork가 있으면 '문서 1'로 등록
    const lastWork=await idbGet('lastWork');
    const id=newDocId(); const savedAt=(lastWork&&lastWork.savedAt)||Date.now();
    const t=sanitizeTree(lastWork&&lastWork.tree)||freshTree();
    const st=docStatsOf(t);
    S.docList=[{id,name:deriveDocName(t),savedAt,createdAt:savedAt,auto:true,pinned:false,folderId:null,nodeCount:st.nodeCount,branches:st.branches,tags:[],memo:''}];
    S.docId=id; S.tree=t;
    await idbSet(DOC_KEY(id),{savedAt,tree:serializeTree(t),inputText:treeToText(t),name:S.docList[0].name});
    persistDocMeta();
  }
  assignDefaultColors(S.tree);
  S.selectedId=S.tree.id;
  renderAll();
}
function freshTree(){ return { id:genId(), label:'나의 생각', children:[], meta:{}, color:'navy' }; }

/* ═══════════ 렌더 ═══════════ */
function renderAll(){ renderHeader(); renderOutline(); if(S.tab==='map') renderMap(); }
function renderHeader(){
  const cur=S.docList.find(d=>d.id===S.docId);
  $('#docName').textContent = cur ? (cur.auto!==false?deriveDocName(S.tree):cur.name) : '문서';
}

/* ── 아웃라인 ── */
function renderOutline(){
  const box=$('#outlineView'); box.innerHTML='';
  if(!S.tree){ box.innerHTML='<div class="ol-empty">문서가 비어 있어요</div>'; return; }
  const frag=document.createDocumentFragment();
  (function row(n,depth,isRoot){
    const div=document.createElement('div');
    div.className='ol-row'+(n.id===S.selectedId?' sel':'');
    div.style.marginLeft=Math.min(depth,8)*18+'px';
    div.dataset.id=n.id;
    const kids=(n.children||[]).length;
    const folded=n.collapsed===true&&!isRoot;
    div.innerHTML =
      '<button class="ol-fold" data-act="fold">'+(kids?(folded?'▸':'▾'):'·')+'</button>'+
      '<span class="ol-dot"><i style="background:'+(COLORS[n.color]||COLORS.navy)+'"></i></span>';
    if(S.editingId===n.id){
      const ta=document.createElement('textarea');
      ta.className='ol-edit'; ta.rows=1; ta.value=n.label||'';
      div.appendChild(ta);
      setTimeout(()=>{ ta.focus(); ta.setSelectionRange(ta.value.length,ta.value.length); autoGrow(ta); },30);
      ta.addEventListener('input',()=>autoGrow(ta));
      ta.addEventListener('keydown',(e)=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); ta.blur(); } });
      ta.addEventListener('blur',()=>{ commitLabel(n.id,ta.value); });
    } else {
      const lb=document.createElement('div');
      lb.className='ol-label'+(isRoot?' root':'')+(n.done?' done':'');
      lb.textContent=(n.label||'').trim()||'(이름 없음)';
      div.appendChild(lb);
    }
    const more=document.createElement('button');
    more.className='ol-more'; more.dataset.act='more'; more.textContent='⋯';
    div.appendChild(more);
    frag.appendChild(div);
    if(kids&&!folded) n.children.forEach(c=>row(c,depth+1,false));
  })(S.tree,0,true);
  box.appendChild(frag);
}
function autoGrow(ta){ ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; }
function commitLabel(id,val){
  const n=S.tree&&findNode(S.tree,id); if(!n){ S.editingId=null; renderOutline(); return; }
  const v=(val||'').replace(/\n+/g,' ').trim();
  if(v!==n.label){ n.label=v; n.updatedAt=new Date().toISOString(); scheduleSave(); }
  S.editingId=null; renderOutline(); renderHeader();
}

/* 아웃라인 터치 라우팅 */
$('#outlineView').addEventListener('click',(e)=>{
  const rowEl=e.target.closest('.ol-row'); if(!rowEl) return;
  const id=rowEl.dataset.id; const act=e.target.closest('[data-act]')?.dataset.act;
  const n=findNode(S.tree,id); if(!n) return;
  if(act==='fold'){ if((n.children||[]).length&&n.id!==S.tree.id){ n.collapsed=n.collapsed===true?undefined:true; scheduleSave(); renderOutline(); } return; }
  if(act==='more'){ S.selectedId=id; renderOutline(); openNodeSheet(id); return; }
  if(S.editingId&&S.editingId!==id) return; // 편집 중엔 blur 커밋 먼저
  if(S.selectedId===id&&!S.editingId){ S.editingId=id; renderOutline(); }
  else { S.selectedId=id; renderOutline(); }
});

/* ═══════════ 노드 조작 ═══════════ */
function addChild(pid){
  const p=findNode(S.tree,pid||S.selectedId)||S.tree;
  const c={ id:genId(), label:'', children:[], meta:{}, color:(p.id===S.tree.id?PALETTE_ORDER[(p.children||[]).length%PALETTE_ORDER.length]:p.color), createdAt:new Date().toISOString() };
  p.children=p.children||[]; p.children.push(c); p.collapsed=undefined;
  S.selectedId=c.id; S.editingId=c.id; scheduleSave(); renderOutline();
}
function addSibling(id){
  if(id===S.tree.id){ addChild(id); return; }
  const p=findParent(S.tree,id); if(!p) return;
  const i=p.children.findIndex(c=>c.id===id);
  const c={ id:genId(), label:'', children:[], meta:{}, color:(p.id===S.tree.id?PALETTE_ORDER[(i+1)%PALETTE_ORDER.length]:p.children[i].color), createdAt:new Date().toISOString() };
  p.children.splice(i+1,0,c);
  S.selectedId=c.id; S.editingId=c.id; scheduleSave(); renderOutline();
}
function indentNode(id){
  const p=findParent(S.tree,id); if(!p) return;
  const i=p.children.findIndex(c=>c.id===id); if(i<1) return toast('앞에 형제가 있어야 들여쓸 수 있어요');
  const n=p.children.splice(i,1)[0]; const np=p.children[i-1];
  np.children=np.children||[]; np.children.push(n); np.collapsed=undefined;
  scheduleSave(); renderOutline();
}
function outdentNode(id){
  const p=findParent(S.tree,id); if(!p) return;
  const gp=findParent(S.tree,p.id); if(!gp) return toast('최상위 가지예요');
  const i=p.children.findIndex(c=>c.id===id); const n=p.children.splice(i,1)[0];
  const pi=gp.children.findIndex(c=>c.id===p.id); gp.children.splice(pi+1,0,n);
  scheduleSave(); renderOutline();
}
function moveNode(id,dir){
  const p=findParent(S.tree,id); if(!p) return;
  const i=p.children.findIndex(c=>c.id===id); const j=i+dir;
  if(j<0||j>=p.children.length) return;
  const [n]=p.children.splice(i,1); p.children.splice(j,0,n);
  scheduleSave(); renderOutline();
}
function deleteNode(id){
  if(id===S.tree.id) return toast('중심 노드는 지울 수 없어요');
  const n=findNode(S.tree,id); const cnt=(()=>{let c=0;walk(n,()=>c++);return c;})();
  if(!confirm('"'+((n.label||'').trim()||'(이름 없음)')+'"'+(cnt>1?' 외 하위 '+(cnt-1)+'개':'')+'를 삭제할까요?')) return;
  const p=findParent(S.tree,id);
  p.children=p.children.filter(c=>c.id!==id);
  if(S.selectedId===id) S.selectedId=p.id;
  scheduleSave(); renderOutline();
}
$('#fab').addEventListener('click',()=>{ if(S.tab!=='outline'){ switchTab('outline'); } addChild(S.selectedId||S.tree.id); });

/* ═══════════ 시트 공통 ═══════════ */
function openSheet(html){ $('#sheet').innerHTML='<div class="grip"></div>'+html; $('#sheet').classList.add('on'); $('#sheetBack').classList.add('on'); }

/* 노드 액션 시트 — ⋯ 버튼 또는 노드 길게 누르기(아웃라인·맵)로 열림 */
function openNodeSheet(id){
  const n=findNode(S.tree,id); if(!n) return;
  const isRoot=id===S.tree.id;
  openSheet(
    '<h3>'+esc((n.label||'').trim()||'(이름 없음)')+'</h3>'+
    '<div class="color-grid">'+Object.keys(COLORS).map(k=>'<button data-color="'+k+'" class="'+(n.color===k?'on':'')+'" style="background:'+COLORS[k]+'"></button>').join('')+'</div>'+
    '<div class="sh-sep"></div>'+
    (!isRoot?'<button class="sh-item" data-a="sibling"><span class="ic">➕</span>추가 — 같은 레벨</button>':'')+
    '<button class="sh-item" data-a="child"><span class="ic">🌿</span>추가 — 하위 레벨</button>'+
    '<button class="sh-item" data-a="rename"><span class="ic">✏️</span>이름 바꾸기</button>'+
    (!isRoot?'<button class="sh-item" data-a="indent"><span class="ic">⤵️</span>들여쓰기 (하위로)</button>':'')+
    (!isRoot?'<button class="sh-item" data-a="outdent"><span class="ic">⤴️</span>내어쓰기 (상위로)</button>':'')+
    (!isRoot?'<button class="sh-item" data-a="up"><span class="ic">🔼</span>위로 이동</button>':'')+
    (!isRoot?'<button class="sh-item" data-a="down"><span class="ic">🔽</span>아래로 이동</button>':'')+
    '<button class="sh-item" data-a="done"><span class="ic">✅</span>'+(n.done?'완료 해제':'완료로 표시')+'</button>'+
    (!isRoot?'<div class="sh-sep"></div><button class="sh-item danger" data-a="del"><span class="ic">🗑</span>삭제</button>':'')
  );
  $('#sheet').onclick=(e)=>{
    const cb=e.target.closest('[data-color]'); if(cb){ const k=cb.dataset.color; walk(n,x=>x.color=k); scheduleSave(); renderOutline(); if(S.tab==='map') renderMap(); closeSheet(); return; }
    const a=e.target.closest('[data-a]')?.dataset.a; if(!a) return;
    closeSheet();
    // 구조를 만들거나 이름을 바꾸는 동작은 편집(아웃라인) 화면에서 이어가는 게 자연스러움
    if((a==='child'||a==='sibling'||a==='rename')&&S.tab==='map') switchTab('outline');
    if(a==='child') addChild(id); else if(a==='sibling') addSibling(id);
    else if(a==='rename'){ S.selectedId=id; S.editingId=id; renderOutline(); }
    else if(a==='indent') indentNode(id); else if(a==='outdent') outdentNode(id);
    else if(a==='up') moveNode(id,-1); else if(a==='down') moveNode(id,1);
    else if(a==='done'){ n.done=!n.done; scheduleSave(); renderOutline(); }
    else if(a==='del') deleteNode(id);
    if(S.tab==='map') renderMap(); // 맵 화면에서 실행한 이동/완료/삭제도 즉시 반영
  };
}

/* ═══════════ 길게 누르기(long-press) → 노드 메뉴 ═══════════ */
function bindLongPress(el, resolveId){
  let timer=null, sx=0, sy=0, fired=false;
  el.addEventListener('pointerdown',(e)=>{
    const id=resolveId(e); if(!id) return;
    if(e.target.closest('.ol-edit')) return; // 라벨 편집 중엔 기본 텍스트 선택 동작 유지
    sx=e.clientX; sy=e.clientY; fired=false;
    clearTimeout(timer);
    timer=setTimeout(()=>{
      timer=null; fired=true;
      try{ navigator.vibrate && navigator.vibrate(12); }catch(_){}
      S.selectedId=id;
      if(S.tab==='map') renderMap(); else renderOutline();
      openNodeSheet(id);
    },500);
  });
  const cancel=()=>{ clearTimeout(timer); timer=null; };
  el.addEventListener('pointermove',(e)=>{ if(timer&&(Math.abs(e.clientX-sx)>10||Math.abs(e.clientY-sy)>10)) cancel(); }); // 스크롤/팬 시작이면 취소
  el.addEventListener('pointerup',cancel);
  el.addEventListener('pointercancel',cancel);
  // 길게 누르기가 발동한 직후 따라오는 click은 무시(행 선택/편집 토글 방지)
  el.addEventListener('click',(e)=>{ if(fired){ fired=false; e.stopPropagation(); e.preventDefault(); } },true);
  el.addEventListener('contextmenu',(e)=>e.preventDefault()); // 브라우저 기본 컨텍스트 메뉴 방지
}
bindLongPress($('#outlineView'), (e)=>e.target.closest('.ol-row')?.dataset.id);
bindLongPress($('#mapView'), (e)=>e.target.closest('.map-node')?.dataset.id);

function fmtWhen(ts){ if(!ts) return ''; const d=new Date(ts); return (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function openDocsSheet(){
  const rows=[...S.docList].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(b.savedAt||0)-(a.savedAt||0)).map(d=>{

  );

async function switchDoc(id){
  if(id===S.docId) return;
  await saveNow();
  const slot=await idbGet(DOC_KEY(id));
  S.docId=id;
  S.tree=sanitizeTree(slot&&slot.tree)||freshTree();

  S.selectedId=S.tree.id; S.editingId=null;
  await idbSet('lastWork',{savedAt:Date.now(),tree:serializeTree(S.tree),inputText:treeToText(S.tree)});
  persistDocMeta(); renderAll();

}
async function createDoc(){
  await saveNow();
  const t=freshTree(); const id=newDocId(); const now=Date.now();
  S.docList.push({id,name:deriveDocName(t),savedAt:now,createdAt:now,auto:true,pinned:false,folderId:null,nodeCount:1,branches:[],tags:[],memo:''});
  S.docId=id; S.tree=t; S.selectedId=t.id; S.editingId=t.id;
  await idbSet(DOC_KEY(id),{savedAt:now,tree:serializeTree(t),inputText:treeToText(t),name:deriveDocName(t)});
  await idbSet('lastWork',{savedAt:now,tree:serializeTree(t),inputText:treeToText(t)});

function renameDoc(id){
  const d=S.docList.find(x=>x.id===id); if(!d) return;
  const cur=(d.auto===false?d.name:(id===S.docId?deriveDocName(S.tree):d.name))||'';
  const v=prompt('문서 이름',cur); if(v===null) return;
  const name=v.trim().slice(0,60);
  S.docList=S.docList.map(x=>x.id===id?{...x,name:name||x.name,auto:name?false:true}:x);
  idbGet(DOC_KEY(id)).then(s=>{ if(s) idbSet(DOC_KEY(id),{...s,name:name||s.name}); });
  persistDocMeta(); openDocsSheet(); renderHeader();
}
async function deleteDoc(id){
  if(S.docList.length<=1) return toast('마지막 문서는 삭제할 수 없어요');
  const d=S.docList.find(x=>x.id===id);
  if(!confirm('"'+(d?d.name:'문서')+'"를 삭제할까요? (되돌릴 수 없어요)')) return;
  S.docList=S.docList.filter(x=>x.id!==id);
  await idbDel(DOC_KEY(id));
  if(S.docId===id){
    const next=[...S.docList].sort((a,b)=>(b.savedAt||0)-(a.savedAt||0))[0];
    const slot=await idbGet(DOC_KEY(next.id));
    S.docId=next.id; S.tree=sanitizeTree(slot&&slot.tree)||freshTree(); assignDefaultColors(S.tree);
    S.selectedId=S.tree.id;

}

/* ═══════════ 맵 보기 (SVG · 핀치줌/팬) ═══════════ */
const MAP={x:40,y:0,scale:1,fitDone:false};
function layoutMap(){
  // 우측 단순 트리: 리프 y를 순차 배치, 부모는 자식 중앙 / x = depth
  const NODE_H=38,GAP_Y=14,GAP_X=52,CHAR_W=7.4,PAD_X=14;
  let cursor=0; const boxes=[];
  (function place(n,depth){
    const kids=(n.collapsed===true&&depth>0)?[]:(n.children||[]);
    const label=((n.label||'').trim()||'(이름 없음)').slice(0,20);
    const w=Math.max(52,label.length*CHAR_W*(depth===0?1.15:1)+PAD_X*2);
    let y;
    if(kids.length){ const ys=kids.map(c=>place(c,depth+1)); y=(ys[0]+ys[ys.length-1])/2; }
    else { y=cursor; cursor+=NODE_H+GAP_Y; }
    n._mx=depth; n._my=y; n._mw=w; n._ml=label;
    boxes.push(n);
    return y;
  })(S.tree,0);
  // depth별 x 오프셋(열 최대폭 누적)
  const colW=[]; boxes.forEach(n=>{ colW[n._mx]=Math.max(colW[n._mx]||0,n._mw); });
  const colX=[0]; for(let i=1;i<colW.length;i++) colX[i]=colX[i-1]+(colW[i-1]||0)+GAP_X;
  boxes.forEach(n=>{ n._mpx=colX[n._mx]; });
  return {boxes,H:Math.max(cursor,NODE_H),W:(colX[colW.length-1]||0)+(colW[colW.length-1]||0)};
}
function renderMap(){
  if(!S.tree) return;
  const svg=$('#mapSvg'); const {boxes,W,H}=layoutMap();
  const NODE_H=38;
  let inner='';
  boxes.forEach(n=>{ (n.collapsed===true&&n!==S.tree?[]:(n.children||[])).forEach(c=>{
    const x1=n._mpx+n._mw, y1=n._my+NODE_H/2, x2=c._mpx, y2=c._my+NODE_H/2, mx=(x1+x2)/2;
    inner+='<path d="M '+x1+' '+y1+' C '+mx+' '+y1+', '+mx+' '+y2+', '+x2+' '+y2+'" stroke="'+(COLORS[c.color]||COLORS.slate)+'" stroke-width="2" fill="none" opacity="0.65"/>';
  }); });
  boxes.forEach(n=>{
    const sel=n.id===S.selectedId;
    inner+='<g class="map-node'+(sel?' sel':'')+'" data-id="'+n.id+'">'+
      '<rect x="'+n._mpx+'" y="'+n._my+'" width="'+n._mw+'" height="'+NODE_H+'" rx="12" fill="'+(COLORS[n.color]||COLORS.navy)+'"/>'+
      '<text x="'+(n._mpx+n._mw/2)+'" y="'+(n._my+NODE_H/2+4.5)+'" text-anchor="middle" font-size="'+(n===S.tree?14:12.5)+'">'+esc(n._ml)+'</text>'+
    '</g>';
  });
  if(!MAP.fitDone){ const vw=$('#mapView').clientWidth,vh=$('#mapView').clientHeight;
    MAP.scale=Math.min(1,Math.max(0.25,Math.min(vw/(W+80),vh/(H+80))));
    MAP.x=(vw-W*MAP.scale)/2; MAP.y=(vh-H*MAP.scale)/2; MAP.fitDone=true; }
  svg.innerHTML='<g transform="translate('+MAP.x+','+MAP.y+') scale('+MAP.scale+')">'+inner+'</g>';
}
$('#mapSvg').addEventListener('click',(e)=>{
  const g=e.target.closest('.map-node'); if(!g) return;
  S.selectedId=g.dataset.id; renderMap();
});
/* 터치 팬/핀치 */
(function(){
  const el=$('#mapView'); let pts=new Map(), start=null;
  el.addEventListener('pointerdown',e=>{ el.setPointerCapture(e.pointerId); pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    start={x:MAP.x,y:MAP.y,scale:MAP.scale,pts:new Map(pts)}; });
  el.addEventListener('pointermove',e=>{
    if(!pts.has(e.pointerId)) return; pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(!start) return;
    if(pts.size===1){ const p0=[...start.pts.values()][0], p1=[...pts.values()][0];
      MAP.x=start.x+(p1.x-p0.x); MAP.y=start.y+(p1.y-p0.y); renderMap(); }
    else if(pts.size>=2){
      const sp=[...start.pts.values()], np=[...pts.values()];
      if(sp.length<2) return;
      const d0=Math.hypot(sp[0].x-sp[1].x,sp[0].y-sp[1].y), d1=Math.hypot(np[0].x-np[1].x,np[0].y-np[1].y);
      const k=Math.min(3,Math.max(0.2,start.scale*(d1/Math.max(1,d0))));
      const cx=(np[0].x+np[1].x)/2, cy=(np[0].y+np[1].y)/2;
      const scx=(sp[0].x+sp[1].x)/2, scy=(sp[0].y+sp[1].y)/2;
      MAP.x=cx-((scx-start.x)/start.scale)*k; MAP.y=cy-((scy-start.y)/start.scale)*k; MAP.scale=k;
      renderMap();
    }
  });
  const up=e=>{ pts.delete(e.pointerId); start=pts.size?{x:MAP.x,y:MAP.y,scale:MAP.scale,pts:new Map(pts)}:null; };
  el.addEventListener('pointerup',up); el.addEventListener('pointercancel',up);
})();

/* ═══════════ 구글 드라이브 (데스크톱과 동일 규칙) ═══════════ */
let _tok=null,_exp=0,_gisClient=null;
function saveTok(){ try{ sessionStorage.setItem(DRIVE_TOKEN_KEY,JSON.stringify({t:_tok,e:_exp})); }catch(e){} }
function loadTok(){ try{ const r=sessionStorage.getItem(DRIVE_TOKEN_KEY); if(!r) return; const o=JSON.parse(r);
  if(o&&o.t&&o.e&&Date.now()<o.e-120000){ _tok=o.t; _exp=o.e; } }catch(e){} }
loadTok();
function gisReady(){ return new Promise((res,rej)=>{
  if(window.google&&google.accounts&&google.accounts.oauth2) return res();
  const s=document.createElement('script'); s.src='https://accounts.google.com/gsi/client'; s.onload=()=>res(); s.onerror=()=>rej(new Error('구글 로그인 스크립트 로드 실패')); document.head.appendChild(s);
}); }
async function ensureToken(interactive){
  if(_tok&&Date.now()<_exp-120000) return _tok;
  await gisReady();
  return new Promise((res,rej)=>{
    _gisClient=google.accounts.oauth2.initTokenClient({ client_id:GOOGLE_CLIENT_ID, scope:GOOGLE_SCOPE,
      callback:(r)=>{ if(r&&r.access_token){ _tok=r.access_token; _exp=Date.now()+(r.expires_in||3600)*1000; saveTok(); res(_tok); } else rej(new Error('로그인이 취소되었어요')); },
      error_callback:()=>rej(new Error('로그인이 취소되었어요')) });
    _gisClient.requestAccessToken({prompt:''});
  });
}
async function dFetch(url,opt){ const r=await fetch(url,{...(opt||{}),headers:{...((opt||{}).headers||{}),Authorization:'Bearer '+_tok}});
  if(!r.ok) throw new Error('드라이브 요청 실패 ('+r.status+')'); return r; }
async function driveFolder(){ const q=encodeURIComponent("name='"+DRIVE_FOLDER_NAME+"' and mimeType='application/vnd.google-apps.folder' and trashed=false");
  const d=await (await dFetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id,name)')).json();
  if(d.files&&d.files[0]) return d.files[0].id;
  const c=await (await dFetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:DRIVE_FOLDER_NAME,mimeType:'application/vnd.google-apps.folder'})})).json();
  return c.id; }
async function driveBackupFolder(parent,create){ const q=encodeURIComponent("name='"+DRIVE_BACKUP_NAME+"' and mimeType='application/vnd.google-apps.folder' and '"+parent+"' in parents and trashed=false");
  const d=await (await dFetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id)')).json();
  if(d.files&&d.files[0]) return d.files[0].id;
  if(!create) return null;
  const c=await (await dFetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:DRIVE_BACKUP_NAME,mimeType:'application/vnd.google-apps.folder',parents:[parent]})})).json();
  return c.id; }
async function driveList(folderId){ const q=encodeURIComponent("'"+folderId+"' in parents and trashed=false and mimeType='application/json'");
  const d=await (await dFetch('https://www.googleapis.com/drive/v3/files?q='+q+'&orderBy=modifiedTime desc&fields=files(id,name,modifiedTime,size)')).json();
  return d.files||[]; }
async function driveDownload(id){ return await (await dFetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media')).text(); }
async function driveUpload(folderId,name,text){
  const meta={name:/\.json$/i.test(name)?name:name+'.json',mimeType:'application/json',parents:[folderId]};
  const b='bbm'+Math.random().toString(36).slice(2);
  const body='--'+b+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(meta)+'\r\n--'+b+'\r\nContent-Type: application/json\r\n\r\n'+text+'\r\n--'+b+'--';
  return await (await dFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,modifiedTime',{method:'POST',headers:{'Content-Type':'multipart/related; boundary='+b},body})).json(); }
async function driveMove(id,add,remove){ await dFetch('https://www.googleapis.com/drive/v3/files/'+id+'?addParents='+encodeURIComponent(add)+'&removeParents='+encodeURIComponent(remove)+'&fields=id',{method:'PATCH'}); }
async function driveDelete(id){ try{ await dFetch('https://www.googleapis.com/drive/v3/files/'+id,{method:'DELETE'}); }catch(e){} }
function browserPrefix(){ try{ let p=localStorage.getItem('bb_drive_prefix');
  if(!p){ p=RESORT_PREFIXES[Math.floor(Math.random()*RESORT_PREFIXES.length)]+'_'; localStorage.setItem('bb_drive_prefix',p); } return p; }catch(e){ return '모바일_'; } }
function buildBase(prefix,date,ver){ const r=(prefix||'').replace(/_+$/,'').trim();
  return r ? date+'_'+r+(ver!=null?'_'+String(ver).padStart(2,'0'):'') : date+(ver!=null?'.'+String(ver).padStart(2,'0'):''); }
function parseBase(base,prefix){ const r=(prefix||'').replace(/_+$/,'').trim();
  if(r){ const esc=r.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); const m=base.match(new RegExp('^(\\d{4}-\\d{2}-\\d{2})_'+esc+'(?:_(\\d+))?$')); if(m) return {date:m[1],ver:m[2]?parseInt(m[2],10):null}; }
  let rest=base; if(prefix){ if(!rest.startsWith(prefix)) return null; rest=rest.slice(prefix.length); }
  const m=rest.match(/^(\d{4}-\d{2}-\d{2})(?:\.(\d+))?$/); return m?{date:m[1],ver:m[2]?parseInt(m[2],10):null}:null; }
async function fetchMergedDriveList(mainId){
  const main=await driveList(mainId);
  const backupId=await driveBackupFolder(mainId,false);
  const backup=backupId?await driveList(backupId):[];
  const tagged=[...main.filter(f=>f.name!==SETTINGS_FILE_NAME).map(f=>({...f,_backup:false})),
                ...backup.filter(f=>f.name!==SETTINGS_FILE_NAME).map(f=>({...f,_backup:true}))];
  const byName=new Map();
  for(const f of tagged){ const ex=byName.get(f.name);
    if(!ex||(Date.parse(f.modifiedTime)||0)>(Date.parse(ex.modifiedTime)||0)) byName.set(f.name,f); }
  return [...byName.values()].sort((a,b)=>(Date.parse(b.modifiedTime)||0)-(Date.parse(a.modifiedTime)||0));
}
/* 저장: 새 버전 업로드 → 메인의 나머지 Backup 이동 → 같은 계열 keep 5 정리 (데스크톱 v3.86.1 규칙) */
async function driveSaveCurrent(){
  await saveNow();
  const prefix=browserPrefix();
  const today=new Date().toISOString().slice(0,10);
  const mainId=await driveFolder();
  const files=await driveList(mainId);
  let max=-1; files.forEach(f=>{ const p=parseBase(f.name.replace(/\.json$/i,''),prefix); if(p&&p.date===today&&p.ver!=null&&p.ver>max) max=p.ver; });
  const name=buildBase(prefix,today,max+1);
  const payload=JSON.stringify({version:'mobile',savedAt:new Date().toISOString(),tree:serializeTree(S.tree)},null,2);
  const saved=await driveUpload(mainId,name,payload);
  try{
    if(saved&&saved.id){
      const backupId=await driveBackupFolder(mainId,true);
      const after=await driveList(mainId);
      for(const f of after){ if(f.id!==saved.id&&f.name!==SETTINGS_FILE_NAME){ try{ await driveMove(f.id,backupId,mainId); }catch(e){} } }
      const backups=(await driveList(backupId)).filter(f=>f.name!==SETTINGS_FILE_NAME);
      const series={}; const keyOf=(nm)=>nm.replace(/\.json$/i,'').replace(/[_.]\d+$/,'');
      backups.forEach(f=>{ (series[keyOf(f.name)]=series[keyOf(f.name)]||[]).push(f); });
      for(const k in series){ const arr=series[k]; if(arr.length<=5) continue;
        arr.sort((a,b)=>(Date.parse(a.modifiedTime)||0)-(Date.parse(b.modifiedTime)||0));
        for(const f of arr.slice(0,arr.length-5)) await driveDelete(f.id); }
    }
  }catch(e){}
  return saved;
}
function openDriveSheet(){
  openSheet('<h3>☁ 구글 드라이브</h3><div class="sh-note" id="dvNote">데스크톱과 같은 BrainBloom 폴더를 씁니다.</div>'+
    '<div class="sh-actions">'+
      '<button class="btn primary" data-v="save">⬆ 현재 문서 저장</button>'+
      '<button class="btn" data-v="list">⬇ 불러오기 목록</button>'+
    '</div><div id="dvList"></div>');
  $('#sheet').onclick=async (e)=>{
    const v=e.target.closest('[data-v]')?.dataset.v;
    const note=$('#dvNote');
    try{
      if(v==='save'){ note.textContent='저장 중…'; await ensureToken(true); const s=await driveSaveCurrent(); note.textContent='"'+s.name+'" 저장 완료'; toast('☁ 저장했어요'); return; }
      if(v==='list'){ note.textContent='목록 불러오는 중…'; await ensureToken(true);
        const mainId=await driveFolder(); const files=await fetchMergedDriveList(mainId);
        note.textContent=files.length?files.length+'개 — 탭하면 새 문서로 가져와요':'저장된 파일이 없어요';
        $('#dvList').innerHTML=files.map(f=>'<div class="doc-row" data-fid="'+f.id+'" data-fn="'+esc(f.name)+'">'+
          '<div class="nm">☁ '+esc(f.name.replace(/\.json$/i,''))+'<span class="sub">'+(f.modifiedTime?new Date(f.modifiedTime).toLocaleDateString():'')+(f.size?' · '+Math.max(1,Math.round(f.size/1024))+' KB':'')+'</span></div>'+
          (f._backup?'<span class="badge">백업</span>':'<span class="badge accent">최신</span>')+'</div>').join('');
        return; }
      const row=e.target.closest('[data-fid]');
      if(row){ note.textContent='가져오는 중…';
        const txt=await driveDownload(row.dataset.fid);
        const data=JSON.parse(txt);
        const t=sanitizeTree(data.tree||data);
        if(!t){ note.textContent='파일 형식이 올바르지 않아요'; return; }
        assignDefaultColors(t);
        await saveNow();
        const id=newDocId(); const now=Date.now();
        const nm=(row.dataset.fn||'').replace(/\.json$/i,'').trim()||deriveDocName(t);
        const st=docStatsOf(t);
        S.docList.push({id,name:nm.slice(0,60),savedAt:now,createdAt:now,auto:false,pinned:false,folderId:null,nodeCount:st.nodeCount,branches:st.branches,tags:[],memo:''});
        await idbSet(DOC_KEY(id),{savedAt:now,tree:serializeTree(t),inputText:treeToText(t),name:nm.slice(0,60)});
        S.docId=id; S.tree=t; S.selectedId=t.id; S.editingId=null;
        await idbSet('lastWork',{savedAt:now,tree:serializeTree(t),inputText:treeToText(t)});
        persistDocMeta(); renderAll(); closeSheet();
        toast('"'+nm+'" 가져왔어요');
      }
    }catch(err){ note.textContent=(err&&err.message)||'오류가 났어요'; }
  };
}

/* ═══════════ 탭/헤더 라우팅 ═══════════ */
function switchTab(tab){
  S.tab=tab;
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  $('#outlineView').classList.toggle('on',tab==='outline');
  $('#mapView').classList.toggle('on',tab==='map');
  $('#fab').style.display=tab==='outline'?'flex':'none';
  if(tab==='map'){ MAP.fitDone=false; renderMap(); }
  if(tab==='docs'){ openDocsSheet(); S.tab='outline'; document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab==='outline')); }
}
document.querySelector('nav').addEventListener('click',(e)=>{ const b=e.target.closest('button'); if(b) switchTab(b.dataset.tab); });
$('#docName').addEventListener('click',openDocsSheet);
$('#btnDrive').addEventListener('click',openDriveSheet);
$('#btnMenu').addEventListener('click',()=>{
  openSheet('<h3>BrainBloom Mobile</h3>'+
    '<button class="sh-item" data-m="desktop"><span class="ic">🖥</span>데스크톱 버전으로 보기</button>'+
    '<button class="sh-item" data-m="collapseAll"><span class="ic">🍂</span>전부 접기</button>'+
    '<button class="sh-item" data-m="expandAll"><span class="ic">🌳</span>전부 펼치기</button>'+
    '<div class="sh-note">모바일 버전은 핵심 편집에 집중합니다. 간트·타임라인·내보내기 등 전체 기능은 데스크톱 버전에서 쓸 수 있어요.</div>');
  $('#sheet').onclick=(e)=>{ const m=e.target.closest('[data-m]')?.dataset.m; if(!m) return; closeSheet();
    if(m==='desktop'){ try{localStorage.setItem('bb_force_desktop','1');}catch(_){} location.href='index.html?desktop'; }
    else if(m==='collapseAll'){ walk(S.tree,n=>{ if(n!==S.tree&&(n.children||[]).length) n.collapsed=true; }); scheduleSave(); renderOutline(); }
    else if(m==='expandAll'){ walk(S.tree,n=>{ n.collapsed=undefined; }); scheduleSave(); renderOutline(); }
  };
});

/* 화면 회전/복귀 시 저장 보장 */
document.addEventListener('visibilitychange',()=>{ if(document.hidden){ clearTimeout(S.saveTimer); saveNow(); } });
window.addEventListener('pagehide',()=>{ clearTimeout(S.saveTimer); saveNow(); });

boot();
</script>
