<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BrainBloom — 브라우저에서 바로 쓰는 마인드맵</title>
<meta name="description" content="설치도 가입도 없이 브라우저에서 바로 쓰는 개인용 마인드맵 · 브레인스토밍 도구. 내용은 내 브라우저에만 저장됩니다." />
<meta name="theme-color" content="#15213a" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<style>
  /* 랜덤 랜딩 디스패처 — 10가지 디자인(landing01~10) 중 하나로 즉시 이동.
     index.html의 첫 방문 안내는 그대로 landing.html을 가리키므로 이 파일이 분배를 맡는다. */
  body { margin: 0; background: #15213a; color: #98a8c8;
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
  .fallback { min-height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px; text-align: center; padding: 24px; }
  noscript .fallback, .fallback.show { display: flex; }
  .fallback a { color: #e8927c; font-weight: 700; text-decoration: none; font-size: 17px; }
  .fallback .list a { display: inline-block; margin: 4px 8px; font-size: 13px; color: #cdd9ee; font-weight: 500; }
</style>
<script>
(function () {
  var variants = ['landing01.html', 'landing02.html', 'landing03.html', 'landing04.html', 'landing05.html',
                  'landing06.html', 'landing07.html', 'landing08.html', 'landing09.html', 'landing10.html'];
  var last = null;
  try { last = sessionStorage.getItem('bb_landing_last'); } catch (e) {}
  // 방금 본 디자인은 제외하고 굴린다 — 각 변형의 "다른 디자인 ↻" 버튼이 항상 새 디자인을 보여주게
  var pool = last ? variants.filter(function (v) { return v !== 'landing' + last + '.html'; }) : variants;
  if (!pool.length) pool = variants;
  location.replace(pool[Math.floor(Math.random() * pool.length)]);
})();
</script>
</head>
<body>
<noscript>
  <div class="fallback">
    <div style="font-size:34px;">🌱</div>
    <div style="font-size:20px; font-weight:800; color:#eef3fb;">BrainBloom — 브라우저에서 바로 쓰는 마인드맵</div>
    <a href="index.html?app">바로 사용하기 →</a>
    <div class="list">
      <a href="landing01.html">디자인 01</a><a href="landing02.html">02</a><a href="landing03.html">03</a><a href="landing04.html">04</a><a href="landing05.html">05</a><a href="landing06.html">06</a><a href="landing07.html">07</a><a href="landing08.html">08</a><a href="landing09.html">09</a><a href="landing10.html">10</a>
    </div>
  </div>
</noscript>
</body>
</html>
